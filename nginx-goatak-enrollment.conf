server {
    listen 8446 ssl;
    server_name adibi.lakida.me;

    ssl_certificate /etc/letsencrypt/live/adibi.lakida.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/adibi.lakida.me/privkey.pem;

    location / {
        proxy_pass https://goatak:8446;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name adibi.lakida.me;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
